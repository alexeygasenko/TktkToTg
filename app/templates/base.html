<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ClipRelay{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="{% block body_class %}{% endblock %}">
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>
  <div class="ambient ambient-three"></div>
  <main class="shell">
    <header>
      {% block eyebrow %}{% endblock %}
      {% block brand %}<div class="brand-title">ClipRelay</div>{% endblock %}
      <h1>{% block heading %}Видео без лишних шагов{% endblock %}</h1>
      <p class="lead">{% block lead %}Единый пульт для видео, превью и Telegram-постов.{% endblock %}</p>
    </header>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
  <script>
    document.addEventListener("click", (event) => {
      const option = event.target.closest("[data-channel-value]");
      const picker = event.target.closest("[data-channel-picker]");
      document.querySelectorAll("[data-channel-picker].open").forEach((item) => {
        if (item !== picker) {
          item.classList.remove("open");
          item.querySelector("[data-channel-menu]").hidden = true;
        }
      });
      if (option) {
        const owner = option.closest("[data-channel-picker]");
        owner.querySelector("input[type=hidden]").value = option.dataset.channelValue;
        owner.querySelector("[data-channel-label]").textContent = option.dataset.channelLabel;
        owner.querySelector("[data-channel-tag]").textContent = option.dataset.channelDisplay;
        owner.querySelectorAll("[data-channel-value]").forEach((item) => item.classList.toggle("selected", item === option));
        owner.classList.remove("open");
        owner.querySelector("[data-channel-menu]").hidden = true;
        return;
      }
      const trigger = event.target.closest("[data-channel-trigger]");
      if (trigger) {
        const owner = trigger.closest("[data-channel-picker]");
        const menu = owner.querySelector("[data-channel-menu]");
        owner.classList.toggle("open");
        menu.hidden = !owner.classList.contains("open");
      }
    });
    document.addEventListener("input", (event) => {
      if (!event.target.matches("[data-channel-search], [data-settings-channel-search]")) return;
      const query = event.target.value.trim().toLowerCase();
      const selector = event.target.matches("[data-channel-search]") ? "[data-channel-value]" : "[data-settings-channel]";
      const owner = event.target.closest("[data-channel-picker], .saved-channels");
      owner.querySelectorAll(selector).forEach((item) => {
        item.hidden = !item.dataset.channelSearchValue.toLowerCase().includes(query);
      });
    });
  </script>
</body>
</html>
